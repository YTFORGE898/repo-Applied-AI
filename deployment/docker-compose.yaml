services:

  api:
    build: .
    container_name: startup-api

    command: >
      uvicorn api:app
      --host 0.0.0.0
      --port 8000

    ports:
      - "8000:8000"

    volumes:
      - .:/app

  frontend:
    build: .
    container_name: startup-frontend

    command: >
      streamlit run frontend.py
      --server.address 0.0.0.0
      --server.port 8501

    environment:
      FASTAPI_URL: http://api:8000

    depends_on:
      - api

    ports:
      - "8501:8501"

    volumes:
      - .:/app